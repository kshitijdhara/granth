services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: granth_user
      POSTGRES_PASSWORD: granth_password
      POSTGRES_DB: granth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granth_user -d granth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ../apps/backend:/app
      # Override .env with docker-internal hostnames (postgres/redis instead of localhost)
      - ../.env.docker:/app/.env:ro
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      # API_BASE_URL is used by the dev server (Bun.env.API_BASE_URL in dev.ts)
      # This is the URL the browser uses, so it must be localhost-accessible
      - API_BASE_URL=http://localhost:8080
    volumes:
      - ../apps/frontend:/app
      # Keep node_modules inside the container to avoid host/container conflicts
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  go_mod_cache:
  frontend_node_modules:
